name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend build env
        shell: bash
        run: |
          missing=0
          if [ -z "${VITE_BACKEND_URL}" ]; then
            echo "::error::Missing required frontend env: VITE_BACKEND_URL"
            missing=1
          fi

          if [ -n "${VITE_BACKEND_URL}" ] && [[ "${VITE_BACKEND_URL}" == http://localhost* ]]; then
            echo "::error::VITE_BACKEND_URL cannot use localhost for GitHub Pages. Set a public HTTPS backend URL in repo variables/secrets."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Set frontend env values in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
