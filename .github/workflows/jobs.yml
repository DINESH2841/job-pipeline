name: Job Pipeline

on:
  schedule:
    # 8:00 AM IST (02:30 UTC)
    - cron: "30 2 * * *"
    # 4:00 PM IST (10:30 UTC)
    - cron: "30 10 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_LINKEDIN_ACTOR: ${{ secrets.APIFY_LINKEDIN_ACTOR }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
      WEBSITE_URL: ${{ secrets.WEBSITE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: backend
        run: npm install

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in SERPAPI_KEY APIFY_TOKEN GOOGLE_SHEET_ID GOOGLE_SERVICE_ACCOUNT_EMAIL GOOGLE_PRIVATE_KEY SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run pipeline
        working-directory: backend
        run: node index.js
