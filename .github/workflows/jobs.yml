name: Job Pipeline

on:
  schedule:
    # 8:00 AM IST (02:30 UTC)
    - cron: "30 2 * * *"
    # 4:00 PM IST (10:30 UTC)
    - cron: "30 10 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_LINKEDIN_ACTOR: ${{ secrets.APIFY_LINKEDIN_ACTOR }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENROUTER_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://openrouter.ai/api/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || secrets.OPENROUTER_MODEL || 'openrouter/auto' }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS || 'dineshsevenni@gmail.com' }}
      ALERT_MIN_GROUP: ${{ secrets['ALERT_MIN_GROUP'] || vars['ALERT_MIN_GROUP'] || 'GOOD' }}
      WEBSITE_URL: ${{ secrets.WEBSITE_URL || 'https://dinesh2841.github.io/job-pipeline/' }}
      JOB_KEYWORDS: ${{ secrets['JOB_KEYWORDS'] || vars['JOB_KEYWORDS'] || 'software engineer,frontend developer,full stack developer,backend developer,ece engineer,electronics engineer,embedded engineer,firmware engineer,vlsi engineer,hardware engineer' }}
      ROLE_SKILLS: ${{ secrets['ROLE_SKILLS'] || vars['ROLE_SKILLS'] || 'node.js,react,javascript,backend,frontend,python,java,express,mongodb,rest api|c,c++,embedded,signal processing,vlsi,circuit design,ece,fpga,asic,rtos,microcontroller,embedded systems,hardware,pcb,iot,arduino,esp32,embedded c,device driver,robotics,control systems,rf,antenna,communication' }}
      JOB_LOCATION: ${{ secrets['JOB_LOCATION'] || vars['JOB_LOCATION'] || 'India' }}
      PREFERRED_LOCATIONS: ${{ secrets['PREFERRED_LOCATIONS'] || vars['PREFERRED_LOCATIONS'] || 'chennai,bangalore,hyderabad,remote,india' }}
      LOCAL_MIN_SCORE: ${{ secrets['LOCAL_MIN_SCORE'] || vars['LOCAL_MIN_SCORE'] || '50' }}
      LOCAL_MAX_EXPERIENCE_YEARS: ${{ secrets['LOCAL_MAX_EXPERIENCE_YEARS'] || vars['LOCAL_MAX_EXPERIENCE_YEARS'] || '6' }}
      DAYS_TO_KEEP: ${{ secrets['DAYS_TO_KEEP'] || vars['DAYS_TO_KEEP'] || '14' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: backend
        run: npm install

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in SERPAPI_KEY APIFY_TOKEN GOOGLE_SHEET_ID GOOGLE_SERVICE_ACCOUNT_EMAIL GOOGLE_PRIVATE_KEY OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Add them in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run pipeline
        working-directory: backend
        run: node index.js
